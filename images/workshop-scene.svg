<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="workshopBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;"/>
      <stop offset="100%" style="stop-color:#ede7f6;"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#workshopBg)"/>
  <!-- Wall -->
  <rect x="50" y="80" width="700" height="340" fill="#fafafa" stroke="#ccc" stroke-width="2"/>
  <!-- Computer desks -->
  <!-- Desk 1 -->
  <rect x="100" y="320" width="150" height="80" fill="#a0826d" stroke="#6b5d53" stroke-width="2"/>
  <!-- CPU tower -->
  <rect x="120" y="280" width="40" height="45" fill="#424242" stroke="#212121" stroke-width="2"/>
  <!-- CPU front panel lights -->
  <circle cx="130" cy="295" r="2" fill="#00ff00"/>
  <circle cx="150" cy="295" r="2" fill="#ff6b6b"/>
  <!-- Monitor -->
  <rect x="165" y="260" width="60" height="50" fill="#333" stroke="#000" stroke-width="2"/>
  <rect x="170" y="265" width="50" height="40" fill="#1a237e"/>
  <!-- Monitor stand -->
  <rect x="190" y="315" width="20" height="10" fill="#666"/>
  <!-- Keyboard -->
  <rect x="125" y="330" width="50" height="15" fill="#696969" stroke="#000" stroke-width="1"/>
  <!-- Mouse -->
  <ellipse cx="190" cy="335" rx="8" ry="12" fill="#696969" stroke="#000" stroke-width="1"/>
  <!-- Desk 2 (offset) -->
  <rect x="320" y="320" width="150" height="80" fill="#a0826d" stroke="#6b5d53" stroke-width="2"/>
  <!-- CPU tower -->
  <rect x="340" y="280" width="40" height="45" fill="#424242" stroke="#212121" stroke-width="2"/>
  <!-- Monitor -->
  <rect x="385" y="260" width="60" height="50" fill="#333" stroke="#000" stroke-width="2"/>
  <rect x="390" y="265" width="50" height="40" fill="#0d47a1"/>
  <!-- Monitor stand -->
  <rect x="410" y="315" width="20" height="10" fill="#666"/>
  <!-- Keyboard -->
  <rect x="345" y="330" width="50" height="15" fill="#696969" stroke="#000" stroke-width="1"/>
  <!-- Mouse -->
  <ellipse cx="410" cy="335" rx="8" ry="12" fill="#696969" stroke="#000" stroke-width="1"/>
  <!-- Desk 3 -->
  <rect x="540" y="320" width="150" height="80" fill="#a0826d" stroke="#6b5d53" stroke-width="2"/>
  <!-- CPU tower -->
  <rect x="560" y="280" width="40" height="45" fill="#424242" stroke="#212121" stroke-width="2"/>
  <!-- Monitor -->
  <rect x="605" y="260" width="60" height="50" fill="#333" stroke="#000" stroke-width="2"/>
  <rect x="610" y="265" width="50" height="40" fill="#1b5e20"/>
  <!-- Monitor stand -->
  <rect x="630" y="315" width="20" height="10" fill="#666"/>
  <!-- Keyboard -->
  <rect x="565" y="330" width="50" height="15" fill="#696969" stroke="#000" stroke-width="1"/>
  <!-- Mouse -->
  <ellipse cx="630" cy="335" rx="8" ry="12" fill="#696969" stroke="#000" stroke-width="1"/>
  <!-- Whiteboard on wall -->
  <rect x="100" y="100" width="300" height="120" fill="#f5f5f5" stroke="#999" stroke-width="2"/>
  <!-- Whiteboard text lines -->
  <line x1="110" y1="130" x2="380" y2="130" stroke="#999" stroke-width="1"/>
  <line x1="110" y1="150" x2="380" y2="150" stroke="#999" stroke-width="1"/>
  <line x1="110" y1="170" x2="380" y2="170" stroke="#999" stroke-width="1"/>
  <line x1="110" y1="190" x2="380" y2="190" stroke="#999" stroke-width="1"/>
  <!-- Sample code on whiteboard -->
  <text x="120" y="135" font-size="10" fill="#333" font-family="monospace">function hello() {</text>
  <text x="120" y="155" font-size="10" fill="#333" font-family="monospace">  console.log("Hi");</text>
  <text x="120" y="175" font-size="10" fill="#333" font-family="monospace">}</text>
  <!-- Projector on ceiling -->
  <rect x="400" y="50" width="60" height="40" fill="#696969" stroke="#000" stroke-width="1"/>
  <circle cx="430" cy="90" r="15" fill="#333"/>
  <!-- Light beam from projector -->
  <ellipse cx="430" cy="150" rx="40" ry="80" fill="#ffeb3b" opacity="0.1"/>
  <!-- Trash bin -->
  <path d="M 710 360 L 720 360 L 720 390 L 710 390 Z" fill="#8b4513" stroke="#5c3a25" stroke-width="1"/>
  <rect x="705" y="355" width="15" height="5" fill="#696969"/>
</svg>