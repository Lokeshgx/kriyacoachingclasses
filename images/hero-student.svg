<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.1;"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.1;"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Student Character -->
  <circle cx="200" cy="100" r="40" fill="#2563eb"/>
  <ellipse cx="200" cy="180" rx="50" ry="60" fill="#2563eb"/>
  <rect x="150" y="200" width="30" height="80" fill="#2563eb" rx="15"/>
  <rect x="220" y="200" width="30" height="80" fill="#2563eb" rx="15"/>
  <circle cx="165" cy="280" r="15" fill="#2563eb"/>
  <circle cx="235" cy="280" r="15" fill="#2563eb"/>
  
  <!-- Books in hand -->
  <rect x="100" y="140" width="40" height="50" fill="#f59e0b" rx="3" transform="rotate(-20 120 165)"/>
  <rect x="260" y="140" width="40" height="50" fill="#10b981" rx="3" transform="rotate(20 280 165)"/>
  
  <!-- Smile -->
  <circle cx="190" cy="95" r="3" fill="white"/>
  <circle cx="210" cy="95" r="3" fill="white"/>
  <line x1="190" y1="110" x2="210" y2="110" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>