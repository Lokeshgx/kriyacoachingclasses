        <text x="24" y="40" font-family="Inter, sans-serif" font-size="20" fill="#0b2b4a" font-weight="600">How NIOS helps learners</text>
        <text x="24" y="80" font-family="Inter, sans-serif" font-size="16" fill="#2d4b66">• Flexible exam schedules and multiple attempts</text>
        <text x="24" y="110" font-family="Inter, sans-serif" font-size="16" fill="#2d4b66">• Wide subject choice and vocational courses</text>
        <text x="24" y="140" font-family="Inter, sans-serif" font-size="16" fill="#2d4b66">• Accessible for working students and adult learners</text>
