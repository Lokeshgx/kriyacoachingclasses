<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.15;"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.15;"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#grad)"/>
  
  <!-- Books stack -->
  <rect x="80" y="200" width="120" height="40" fill="#ef4444" rx="3"/>
  <rect x="70" y="150" width="120" height="40" fill="#f59e0b" rx="3"/>
  <rect x="60" y="100" width="120" height="40" fill="#10b981" rx="3"/>
  <rect x="50" y="50" width="120" height="40" fill="#2563eb" rx="3"/>
  
  <!-- Decorative stars -->
  <circle cx="250" cy="120" r="8" fill="#f59e0b" opacity="0.6"/>
  <circle cx="320" cy="180" r="6" fill="#10b981" opacity="0.6"/>
  <circle cx="280" cy="280" r="7" fill="#2563eb" opacity="0.6"/>
  <circle cx="350" cy="100" r="5" fill="#ef4444" opacity="0.6"/>
  
  <!-- Pencil -->
  <line x1="200" y1="250" x2="300" y2="350" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
  <polygon points="300,350 310,345 305,355" fill="#2563eb"/>
</svg>