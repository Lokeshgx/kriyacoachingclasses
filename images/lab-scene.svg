<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="labBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;"/>
      <stop offset="100%" style="stop-color:#e0f2fe;"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#labBg)"/>
  <!-- Wall -->
  <rect x="50" y="80" width="700" height="340" fill="#f5f5f5" stroke="#999" stroke-width="2"/>
  <!-- Door -->
  <rect x="700" y="300" width="50" height="120" fill="#8b5a3c"/>
  <!-- Lab bench table -->
  <rect x="100" y="320" width="200" height="80" fill="#cd853f" stroke="#8b5a3c" stroke-width="2"/>
  <!-- Drawers -->
  <rect x="110" y="330" width="50" height="25" fill="#a0522d" stroke="#6b3410" stroke-width="1"/>
  <rect x="170" y="330" width="50" height="25" fill="#a0522d" stroke="#6b3410" stroke-width="1"/>
  <rect x="230" y="330" width="50" height="25" fill="#a0522d" stroke="#6b3410" stroke-width="1"/>
  <!-- Handles on drawers -->
  <circle cx="135" cy="342" r="2" fill="#ffd700"/>
  <circle cx="195" cy="342" r="2" fill="#ffd700"/>
  <circle cx="255" cy="342" r="2" fill="#ffd700"/>
  <!-- Beakers and flasks on table -->
  <g id="beaker">
    <path d="M 130 310 L 125 260 L 140 260 L 135 310 Z" fill="#4dd0e1" stroke="#00838f" stroke-width="2"/>
    <line x1="125" y1="265" x2="140" y2="265" stroke="#00838f" stroke-width="1"/>
    <!-- Liquid inside -->
    <path d="M 126 295 L 125 260 L 140 260 L 139 295 Z" fill="#00bcd4" opacity="0.6"/>
  </g>
  <use href="#beaker" x="50" y="0"/>
  <use href="#beaker" x="100" y="0"/>
  <!-- Flask -->
  <path d="M 260 310 Q 255 280 260 250 Q 265 245 270 245 Q 275 245 280 250 Q 285 280 280 310 Z" fill="#ff7043" stroke="#d84315" stroke-width="2"/>
  <ellipse cx="270" cy="245" rx="10" ry="5" fill="#d84315"/>
  <!-- Liquid in flask -->
  <path d="M 257 295 Q 260 275 260 250 Q 265 245 270 245 Q 275 245 280 250 Q 282 275 283 295 Z" fill="#ff9800" opacity="0.5"/>
  <!-- Test tubes in rack -->
  <rect x="320" y="310" width="100" height="10" fill="#8b5a3c" stroke="#5c3a25" stroke-width="1"/>
  <!-- Test tubes -->
  <g id="testtube">
    <rect x="335" y="280" width="8" height="35" fill="#c5e1a5" stroke="#558b2f" stroke-width="1"/>
    <rect x="335" y="300" width="8" height="15" fill="#9ccc65" opacity="0.7"/>
  </g>
  <use href="#testtube" x="20" y="0"/>
  <use href="#testtube" x="40" y="0"/>
  <use href="#testtube" x="60" y="0"/>
  <!-- Bunsen burner -->
  <rect x="480" y="280" width="8" height="35" fill="#696969"/>
  <ellipse cx="484" cy="280" rx="8" ry="5" fill="#ffd700" stroke="#ffa500" stroke-width="1"/>
  <!-- Flame -->
  <ellipse cx="484" cy="268" rx="6" ry="10" fill="#ff6b6b" opacity="0.7"/>
  <!-- Microscope -->
  <rect x="580" y="290" width="25" height="50" fill="#696969" stroke="#000" stroke-width="1"/>
  <ellipse cx="592" cy="285" rx="15" ry="8" fill="#4dd0e1" stroke="#000" stroke-width="1"/>
  <circle cx="592" cy="348" r="12" fill="#ccc" stroke="#000" stroke-width="1"/>
  <!-- Arrow/pointer on microscope -->
  <rect x="605" y="310" width="25" height="3" fill="#696969"/>
  <!-- Window showing lab activity -->
  <g id="window">
    <rect x="130" y="120" width="80" height="60" fill="#e0f7fa" stroke="#00838f" stroke-width="2"/>
    <line x1="170" y1="120" x2="170" y2="180" stroke="#00838f" stroke-width="1"/>
    <line x1="130" y1="150" x2="210" y2="150" stroke="#00838f" stroke-width="1"/>
  </g>
  <!-- Period table on wall -->
  <rect x="500" y="120" width="150" height="100" fill="#fff" stroke="#666" stroke-width="1"/>
  <text x="575" y="145" font-size="14" text-anchor="middle" fill="#333">Periodic Table</text>
</svg>