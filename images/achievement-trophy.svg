<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.1;"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.1;"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#trophyGrad)"/>
  
  <!-- Trophy base -->
  <rect x="150" y="280" width="100" height="30" fill="#f59e0b" rx="5"/>
  <polygon points="160,280 240,280 230,250 170,250" fill="#f59e0b"/>
  
  <!-- Trophy stem -->
  <rect x="185" y="200" width="30" height="50" fill="#f59e0b" rx="5"/>
  
  <!-- Trophy cup -->
  <path d="M 120 200 Q 120 120 140 100 L 260 100 Q 280 120 280 200" fill="#fbbf24" stroke="#f59e0b" stroke-width="3"/>
  <path d="M 120 200 Q 100 200 100 220" fill="none" stroke="#f59e0b" stroke-width="4"/>
  <path d="M 280 200 Q 300 200 300 220" fill="none" stroke="#f59e0b" stroke-width="4"/>
  
  <!-- Star on trophy -->
  <polygon points="200,130 210,160 240,160 215,180 225,210 200,190 175,210 185,180 160,160 190,160" fill="#fbbf24"/>
  
  <!-- Celebration elements -->
  <circle cx="80" cy="100" r="8" fill="#10b981" opacity="0.7"/>
  <circle cx="320" cy="80" r="6" fill="#2563eb" opacity="0.7"/>
  <circle cx="60" cy="250" r="7" fill="#ef4444" opacity="0.7"/>
</svg>