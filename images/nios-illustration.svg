      <text x="180" y="80" font-family="Poppins, sans-serif" font-size="36" fill="#0b2b4a" font-weight="600">NIOS - Open Schooling</text>
      <text x="180" y="120" font-family="Inter, sans-serif" font-size="18" fill="#375a7f">Flexible secondary and senior secondary certification</text>

